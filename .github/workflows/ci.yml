name: Weather Data Platform CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests pyspark pytest

      - name: Check Python syntax
        run: |
          python -m py_compile scripts/ingest_weather_api.py
          python -m py_compile spark_jobs/bronze_to_silver_weather.py


      - name: Scan for hardcoded secrets
        run: |
          ! grep -R "weather_password" . --exclude=.github/workflows/ci.yml
          ! grep -R "postgres_password:" . --exclude=.github/workflows/ci.yml

      - name: Run unit tests
        run: |
          pytest tests