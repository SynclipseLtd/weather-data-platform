name: Weather Data Platform CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests pyspark pytest ruff

      - name: Check Python syntax
        run: |
          python -m py_compile scripts/ingest_weather_api.py
          python -m py_compile spark_jobs/bronze_to_silver_weather.py

      - name: Run linting
        run: |
          ruff check scripts spark_jobs tests


      - name: Scan for hardcoded secrets
        run: |
          ! grep -R "weather_password" config dags docker scripts spark_jobs sql tests docker-compose.postgres.yaml
          ! grep -R "postgres_password:" config dags docker scripts spark_jobs sql tests docker-compose.postgres.yaml
          ! grep -R "POSTGRES_PASSWORD=.*" config dags docker scripts spark_jobs sql tests docker-compose.postgres.yaml

      - name: Run unit tests
        run: |
          PYTHONPATH=. pytest tests