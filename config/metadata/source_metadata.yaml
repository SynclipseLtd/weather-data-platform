sources:
  open_meteo:
    source_name: open_meteo
    domain: weather
    load_type: incremental
    bronze_format: json
    silver_format: parquet
    gold_format: parquet

    primary_key:
      - source
      - weather_timestamp
      - environment

    required_columns:
      - weather_timestamp
      - temperature_2m
      - relative_humidity_2m

    partition_column: weather_date

    validation_rules:
      temperature_2m:
        min: -50
        max: 60

      relative_humidity_2m:
        min: 0
        max: 100